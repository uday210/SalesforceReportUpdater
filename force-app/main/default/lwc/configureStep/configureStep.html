<template>
    <lightning-card title="Configure Scan" icon-name="utility:settings">
        <div class="slds-p-around_medium">

            <!-- Object name + Load button -->
            <div class="slds-grid slds-gutters slds-grid_vertical-align-end slds-m-bottom_medium">
                <div class="slds-col slds-grow">
                    <lightning-input
                        label="Object API Name"
                        placeholder="e.g. Opportunity or My_Object__c"
                        value={objectName}
                        onchange={handleObjectNameChange}
                        onkeyup={handleKeyUp}
                    ></lightning-input>
                </div>
                <div class="slds-col slds-shrink">
                    <lightning-button
                        label="Load Fields"
                        onclick={handleLoadFields}
                        disabled={loadDisabled}
                    ></lightning-button>
                </div>
            </div>

            <!-- Error -->
            <template if:true={fieldsError}>
                <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                    <span class="slds-assistive-text">error</span>
                    <lightning-icon icon-name="utility:error" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    {fieldsError}
                </div>
            </template>

            <!-- Spinner -->
            <template if:true={loadingFields}>
                <lightning-spinner alternative-text="Loading fields..." size="small"></lightning-spinner>
            </template>

            <!-- Field list -->
            <template if:true={hasFields}>
                <div class="slds-form-element slds-m-bottom_medium">
                    <div class="slds-form-element__label slds-m-bottom_x-small">
                        <strong>Select Fields to Investigate</strong>
                        <span class="slds-text-color_weak slds-m-left_x-small">
                            ({selectedCount} selected — leave all unchecked to scan all reports)
                        </span>
                    </div>

                    <!-- Search -->
                    <lightning-input
                        type="search"
                        label="Search fields"
                        variant="label-hidden"
                        placeholder="Search by label or API name…"
                        onchange={handleSearch}
                        class="slds-m-bottom_x-small"
                    ></lightning-input>

                    <!-- Select all row -->
                    <div class="slds-p-around_x-small slds-border_bottom select-all-row">
                        <label class="slds-checkbox__label">
                            <input
                                type="checkbox"
                                class="slds-checkbox"
                                checked={allSelected}
                                onchange={toggleAll}
                            />
                            <span class="slds-checkbox_faux"></span>
                            <span class="slds-form-element__label">{filteredCountLabel}</span>
                        </label>
                    </div>

                    <!-- Field rows -->
                    <div class="field-list">
                        <template for:each={filteredFields} for:item="field">
                            <div key={field.apiName} class={field.rowClass}>
                                <label class="slds-checkbox__label">
                                    <input
                                        type="checkbox"
                                        class="slds-checkbox"
                                        checked={field.selected}
                                        data-apiname={field.apiName}
                                        onchange={handleFieldToggle}
                                    />
                                    <span class="slds-checkbox_faux"></span>
                                    <span class="slds-form-element__label">
                                        <span class="field-label">{field.label}</span>
                                        <span class="slds-badge slds-m-left_x-small {field.typeBadgeClass}">{field.typeLabel}</span>
                                        <span class="slds-text-color_weak slds-text-body_small slds-m-left_x-small">{field.apiName}</span>
                                    </span>
                                </label>
                            </div>
                        </template>
                        <template if:true={noFieldsMatch}>
                            <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                                No fields match
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Find Reports button -->
                <lightning-button
                    variant="brand"
                    label={findReportsLabel}
                    icon-name="utility:search"
                    onclick={handleFindReports}
                ></lightning-button>
            </template>

        </div>
    </lightning-card>
</template>
