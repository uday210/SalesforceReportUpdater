<template>
    <div class="slds-form-element">
        <label class="slds-form-element__label">{label}</label>
        <div class="slds-form-element__control">
            <div class={containerClass} aria-expanded={open} aria-haspopup="listbox" role="combobox">
                <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                    <input
                        type="text"
                        class="slds-input slds-combobox__input"
                        placeholder={placeholder}
                        value={displayValue}
                        onfocus={handleFocus}
                        oninput={handleInput}
                        onblur={handleBlur}
                        autocomplete="off"
                        role="textbox"
                    />
                    <span class="slds-icon_container slds-icon-utility-search slds-input__icon slds-input__icon_right slds-icon_x-small">
                        <lightning-icon icon-name="utility:search" size="x-small" class="slds-icon slds-icon_x-small slds-icon-text-default"></lightning-icon>
                    </span>
                </div>

                <template if:true={open}>
                    <div
                        class="slds-dropdown slds-dropdown_length-7 slds-dropdown_fluid"
                        role="listbox"
                    >
                        <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                            <template for:each={filteredOptions} for:item="opt">
                                <li key={opt.value} role="presentation" class="slds-listbox__item">
                                    <span
                                        class={opt.itemClass}
                                        role="option"
                                        data-value={opt.value}
                                        onmousedown={handleOptionMouseDown}
                                    >
                                        <span class="slds-media__figure slds-listbox__option-icon">
                                            <template if:true={opt.isSelected}>
                                                <lightning-icon icon-name="utility:check" size="x-small"></lightning-icon>
                                            </template>
                                        </span>
                                        <span class="slds-media__body">
                                            <span class="slds-truncate">{opt.label}</span>
                                        </span>
                                    </span>
                                </li>
                            </template>

                            <template if:true={noMatches}>
                                <li role="presentation" class="slds-listbox__item">
                                    <span class="slds-media slds-listbox__option slds-listbox__option_plain">
                                        <span class="slds-media__body slds-text-color_weak">No matches for "{search}"</span>
                                    </span>
                                </li>
                            </template>
                        </ul>
                    </div>
                </template>
            </div>
        </div>
    </div>
</template>
